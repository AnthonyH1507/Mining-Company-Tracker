{% extends 'base.html' %}

{% block content %}
<div class="hero">
    <h1><i class="fas fa-search"></i> Mining Company Tracker</h1>
    <p>Search public mining companies by ticker and view detailed project information</p>
</div>

<div class="container-lg">
    <!-- Search Card -->
    <div class="search-card">
        <h2 style="margin-bottom: 25px; color: var(--primary-color);"><i class="fas fa-search"></i> Search by Ticker</h2>
        <div class="search-input-group">
            <input type="text" id="tickerInput" placeholder="Enter company ticker (e.g., BHP, RIO, VALE, FCX, NEM)" onkeypress="handleKeyPress(event)">
            <button onclick="searchCompany()"><i class="fas fa-search"></i> Search</button>
        </div>
        <div style="margin-top: 15px; font-size: 0.9rem; color: #666;">
            <strong>Popular tickers:</strong> BHP, RIO, VALE, FCX, NEM, GLD, AEM, TECK
        </div>
    </div>

    <!-- Quick Access Companies -->
    <div style="margin-bottom: 40px;">
        <h3 style="color: var(--primary-color); margin-bottom: 20px;"><i class="fas fa-star"></i> Major Mining Companies</h3>
        <div id="companiesList" class="companies-list"></div>
    </div>

    <!-- Results Section -->
    <div id="resultsSection" style="display: none;">
        <div id="companyInfo"></div>
        
        <div style="margin-top: 40px;">
            <div class="tabs">
                <button class="tab-button active" onclick="showTab('metrics')"><i class="fas fa-chart-bar"></i> Metrics</button>
                <button class="tab-button" onclick="showTab('projects')"><i class="fas fa-building"></i> Projects</button>
            </div>
            
            <div id="metrics" class="tab-content active">
                <div id="metricsContainer"></div>
            </div>
            
            <div id="projects" class="tab-content">
                <div id="projectsContainer"></div>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading" style="display: none;">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p style="margin-top: 15px; color: var(--primary-color);">Loading data...</p>
    </div>

    <!-- Error Message -->
    <div id="errorMessage" style="display: none;"></div>
</div>

<script>
    const API_BASE = 'http://localhost:5000/api';

    // Load major companies on page load
    document.addEventListener('DOMContentLoaded', function() {
        loadMajorCompanies();
    });

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            searchCompany();
        }
    }

    function searchCompany() {
        const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
        
        if (!ticker) {
            showError('Please enter a ticker symbol');
            return;
        }

        showLoading();
        hideError();

        fetch(`${API_BASE}/company/search`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ ticker: ticker })
        })
        .then(response => {
            if (!response.ok) throw new Error('Company not found');
            return response.json();
        })
        .then(data => {
            displayCompanyInfo(data);
            loadCompanyMetrics(ticker);
            loadCompanyProjects(ticker);
        })
        .catch(error => {
            hideLoading();
            showError('Error: ' + error.message + '. Please check the ticker and try again.');
        });
    }

    function loadMajorCompanies() {
        fetch(`${API_BASE}/tickers/major-mining-companies`)
        .then(response => response.json())
        .then(data => {
            const list = document.getElementById('companiesList');
            list.innerHTML = '';
            data.companies.forEach(company => {
                const chip = document.createElement('div');
                chip.className = 'company-chip';
                chip.innerHTML = `
                    <div class="company-chip-ticker">${company.ticker}</div>
                    <div class="company-chip-name">${company.name}</div>
                `;
                chip.onclick = () => {
                    document.getElementById('tickerInput').value = company.ticker;
                    searchCompany();
                };
                list.appendChild(chip);
            });
        })
        .catch(error => console.error('Error loading companies:', error));
    }

    function displayCompanyInfo(data) {
        const infoDiv = document.getElementById('companyInfo');
        infoDiv.innerHTML = `
            <div class="company-info">
                <div class="company-header">
                    <div>
                        <div class="company-name">${data.name}</div>
                        <div style="color: #666; margin-top: 5px;">${data.sector} • ${data.country}</div>
                    </div>
                    <div class="ticker-badge">${data.ticker}</div>
                </div>
                <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-top: 15px;">
                    <div>
                        <strong style="color: #666;">Exchange:</strong>
                        <div style="color: var(--primary-color); font-size: 1.1rem;">${data.exchange}</div>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('resultsSection').style.display = 'block';
    }

    function loadCompanyMetrics(ticker) {
        fetch(`${API_BASE}/company/${ticker}/metrics`)
        .then(response => response.json())
        .then(data => {
            displayMetrics(data);
            hideLoading();
        })
        .catch(error => {
            console.error('Error loading metrics:', error);
            hideLoading();
        });
    }

    function displayMetrics(data) {
        const container = document.getElementById('metricsContainer');
        container.innerHTML = `
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Total Projects</div>
                    <div class="metric-value">${data.total_projects}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Producing</div>
                    <div class="metric-value">${data.producing_projects}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Development</div>
                    <div class="metric-value">${data.development_projects}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Proven Reserves (Mt)</div>
                    <div class="metric-value">${data.total_proven_reserves_mt.toFixed(1)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Probable Reserves (Mt)</div>
                    <div class="metric-value">${data.total_probable_reserves_mt.toFixed(1)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Total Reserves (Mt)</div>
                    <div class="metric-value">${(data.reserve_category_breakdown.total).toFixed(1)}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Avg Grade</div>
                    <div class="metric-value">${data.average_grade}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Ore Types</div>
                    <div class="metric-value" style="font-size: 1rem;">${data.ore_types.slice(0, 3).join(', ')}</div>
                </div>
            </div>
        `;
    }

    function loadCompanyProjects(ticker) {
        fetch(`${API_BASE}/company/${ticker}/projects`)
        .then(response => response.json())
        .then(data => {
            displayProjects(data.projects);
        })
        .catch(error => console.error('Error loading projects:', error));
    }

    function displayProjects(projects) {
        const container = document.getElementById('projectsContainer');
        
        if (!projects || projects.length === 0) {
            container.innerHTML = '<p style="color: #666;">No projects found</p>';
            return;
        }

        container.innerHTML = projects.map(project => `
            <div class="project-card">
                <div class="project-header">
                    <div class="project-name">${project.name}</div>
                    <span class="status-badge status-${project.status.toLowerCase()}">${project.status}</span>
                </div>
                <div style="color: #666; margin-bottom: 15px;">
                    <i class="fas fa-map-marker-alt"></i> ${project.location}
                </div>
                <div class="project-details">
                    <div class="detail-item">
                        <div class="detail-label">Stage</div>
                        <div class="detail-value">${project.stage || 'N/A'}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Ore Types</div>
                        <div class="detail-value">${(project.ore_types || []).join(', ')}</div>
                    </div>
                    ${project.reserves ? `
                        <div class="detail-item">
                            <div class="detail-label">Proven (Mt)</div>
                            <div class="detail-value">${project.reserves.proven || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Probable (Mt)</div>
                            <div class="detail-value">${project.reserves.probable || 'N/A'}</div>
                        </div>
                    ` : ''}
                    ${project.grade ? `
                        <div class="detail-item">
                            <div class="detail-label">Grade</div>
                            <div class="detail-value">${project.grade}%</div>
                        </div>
                    ` : ''}
                    ${project.strip_ratio ? `
                        <div class="detail-item">
                            <div class="detail-label">Strip Ratio</div>
                            <div class="detail-value">${project.strip_ratio}</div>
                        </div>
                    ` : ''}
                    ${project.production_rate ? `
                        <div class="detail-item">
                            <div class="detail-label">Prod. Rate (Mtpa)</div>
                            <div class="detail-value">${project.production_rate}</div>
                        </div>
                    ` : ''}
                </div>
            </div>
        `).join('');
    }

    function showTab(tabName) {
        // Hide all tabs
        document.querySelectorAll('.tab-content').forEach(tab => {
            tab.classList.remove('active');
        });
        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.classList.remove('active');
        });

        // Show selected tab
        document.getElementById(tabName).classList.add('active');
        event.target.classList.add('active');
    }

    function showLoading() {
        document.getElementById('loadingSpinner').style.display = 'block';
    }

    function hideLoading() {
        document.getElementById('loadingSpinner').style.display = 'none';
    }

    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-circle"></i> ${message}</div>`;
        errorDiv.style.display = 'block';
    }

    function hideError() {
        document.getElementById('errorMessage').style.display = 'none';
    }
</script>
{% endblock %}
